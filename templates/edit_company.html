<!DOCTYPE html>
<html>
<head>
    <title>Edit Company</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h2>Edit Company Application</h2>

    <form action="/update_company/{{ company[0] }}" method="POST">

        <input type="text"
               name="company_name"
               value="{{ company[1] }}"
               required>

        <input type="text"
               name="role"
               value="{{ company[2] }}"
               required>

        <input type="date"
               name="application_date"
               value="{{ company[3] }}"
               required>

        <select name="status">

            <option {% if company[4]=='Applied' %}selected{% endif %}>
                Applied
            </option>

            <option {% if company[4]=='OA Scheduled' %}selected{% endif %}>
                OA Scheduled
            </option>

            <option {% if company[4]=='Interview' %}selected{% endif %}>
                Interview
            </option>

            <option {% if company[4]=='Rejected' %}selected{% endif %}>
                Rejected
            </option>

            <option {% if company[4]=='Selected' %}selected{% endif %}>
                Selected
            </option>

        </select>

        <textarea
            name="notes"
            rows="4">{{ company[6] }}</textarea>

        <button type="submit">Update Company</button>

    </form>

    <br>

    <a href="/companies">← Back to Company Tracker</a>

</div>

</body>
</html>
