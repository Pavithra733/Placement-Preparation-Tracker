<!DOCTYPE html>
<html>
<head>
    <title>Register - Placement Preparation Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <h2>Placement Preparation Tracker</h2>
    </nav>

    <div class="container">
        <div class="edit-page-box">
            <h1>Register</h1>
            <p class="subtitle">Create your account to start tracking.</p>

            <form action="/register" method="POST" class="edit-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>

                <div class="edit-actions">
                    <button type="submit" class="save-btn">Register</button>
                    <a href="/login" class="reset-btn">Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
